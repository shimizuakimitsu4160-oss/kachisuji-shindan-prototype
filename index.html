<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>ひとりビジネス勝ち筋診断 プロトタイプ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      background: linear-gradient(135deg, #f7f7f7, #ffffff);
      color: #111;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 12px 36px rgba(0,0,0,0.08); padding: 24px; }
    h1 { font-size: 34px; margin: 0 0 8px; }
    h2 { font-size: 24px; margin: 0 0 12px; }
    h3 { font-size: 20px; margin: 0 0 8px; }
    p { line-height: 1.8; margin: 0 0 16px; }
    .muted { color: #666; font-size: 14px; }
    .badge { display: inline-block; background: #111; color: #fff; border-radius: 999px; padding: 6px 12px; font-size: 12px; margin-bottom: 12px; }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 14px; font-size: 16px; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
    button { border: none; border-radius: 14px; padding: 14px 18px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #111; color: #fff; }
    .btn-secondary { background: #efefef; color: #111; }
    .btn-full { width: 100%; }
    .progress { width: 100%; height: 12px; background: #eee; border-radius: 999px; overflow: hidden; margin: 16px 0 6px; }
    .progress-bar { height: 100%; background: #111; width: 0%; transition: width 0.2s ease; }
    .question-card { margin-top: 24px; }
    .answer-btn { width: 100%; text-align: left; border: 1px solid #ddd; background: #fff; padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .answer-btn.selected { background: #111; color: #fff; border-color: #111; }
    .answer-label { font-weight: bold; width: 24px; }
    .result-card { border: 1px solid #eee; border-radius: 22px; padding: 20px; margin-bottom: 16px; background: #fafafa; }
    .hidden { display: none; }
  </style>
  <script src="kachisuji_implementation_data.js"></script>
</head>

      <div class="grid grid-2" style="margin-top: 24px;">
        <div>
          <label for="name">お名前（任意）</label>
          <input id="name" type="text" placeholder="例）清水章充" />
        </div>
        <div>
          <label for="birthdate">生年月日（必須）</label>
          <input id="birthdate" type="date" />
        </div>
      </div>
      <div style="margin-top: 20px;">
        <button id="startBtn" class="btn-primary btn-full">診断をはじめる</button>

    </div>

    <div id="screen-question" class="card hidden"></div>
