    label {

      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input {

    }
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;

    }
    .btn-primary {

      color: #fff;
    }
    .btn-secondary {

    }
    .btn-full { width: 100%; }
    .progress {
      width: 100%;
      height: 12px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 6px;
    }
    .progress-bar {
      height: 100%;
      background: #111;
      width: 0%;

    }
    .question-box {
      background: #fafafa;
      border-radius: 22px;
      padding: 24px;
    }
    .choice {
      width: 100%;
      text-align: left;
      border: 1px solid #ddd;
      background: #fff;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 12px;
    }
    .choice.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .result-card {
      border: 1px solid #eee;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 16px;
      background: #fff;
    }
    .result-number {
      color: #666;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .radar-item { margin-bottom: 12px; }
    .radar-head {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .radar-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }
    .radar-fill {
      height: 100%;
      background: #111;
      border-radius: 999px;
    }
    .hidden { display: none; }
    @media (max-width: 640px) {
      h1 { font-size: 28px; }
      h2 { font-size: 24px; }
      .card { padding: 18px; }
    }
      .answer-btn.selected {
  border: 2px solid #111;
  background: #111;
  color: #fff;
}

.answer-btn.selected .answer-label {
  color: #fff;
}

    function getBirthSeed(birthdate) {
      if (!birthdate) return 0;
      return birthdate.replaceAll("-", "").split("").map(Number).reduce((a, b) => a + b, 0) % 5;
    }

function analyzeAnswers() {
  const birthdaySeed = getBirthSeed(birthdate);

  const workStyleScores = {
    deep: 0,
    detail: 0,
    team: 0,
    expert: 0,
    result: 0,
    newValue: 0,
    shortcut: 0,
    dialogue: 0,
    trend: 0
  };

  const marketingScores = {
    collab: 0,
    broadcast: 0,
    words: 0,
    referral: 0,
    funnel: 0,
    action: 0,
    soft: 0,
    place: 0
  };

  for (let q = 1; q <= 12; q++) {
    const answer = answers[q];
    const map = window.kachisujiData.workStyleScoring[q];
    if (answer && map && map[answer]) {
      workStyleScores[map[answer]] += 1;
    }
  }

  for (let q = 13; q <= 20; q++) {
    const answer = answers[q];
    const map = window.kachisujiData.marketingScoring[q];
    if (answer && map && map[answer]) {
      marketingScores[map[answer]] += 1;
    }
  }

  if (window.kachisujiData.applyMarketingBonuses) {
    window.kachisujiData.applyMarketingBonuses(answers, marketingScores);
  }

  function pickWinner(scores, tieBreakQuestions, scoringMap) {
    const max = Math.max(...Object.values(scores));
    let candidates = Object.keys(scores).filter(k => scores[k] === max);

    if (candidates.length === 1) return candidates[0];

    for (const q of tieBreakQuestions) {
      const answer = answers[q];
      const key = scoringMap[q] && scoringMap[q][answer];
      if (key && candidates.includes(key)) return key;
    }

    return candidates[0];
  }

  const workStyleKey = pickWinner(
    workStyleScores,
    window.kachisujiData.workTieBreakQuestions,
    window.kachisujiData.workStyleScoring
  );

  const marketingKey = pickWinner(
    marketingScores,
    window.kachisujiData.marketingTieBreakQuestions,
    window.kachisujiData.marketingScoring
  );

  const customerModifier =
    answers[21] === "A" ? "共鳴・温度感重視" : "知識・専門性重視";

  let aCount = 0;
  let bCount = 0;
  for (let q = 22; q <= 32; q++) {
    if (answers[q] === "A") aCount += 1;
    if (answers[q] === "B") bCount += 1;
  }

  let losingRiskLabel = "感情・勢い先行リスク";
  if (bCount > aCount) losingRiskLabel = "考えすぎ・停止リスク";
  if (aCount === bCount) {
    let aTie = 0;
    let bTie = 0;
    [23, 30, 32].forEach(q => {
      if (answers[q] === "A") aTie += 1;
      if (answers[q] === "B") bTie += 1;
    });
    losingRiskLabel = aTie >= bTie ? "感情・勢い先行リスク" : "考えすぎ・停止リスク";
  }

  const winBeliefType = [
    "導く太陽",
    "深海探求",
    "旋風ムーブメント",
    "共鳴の灯火",
    "静かな革命"
  ][birthdaySeed] || "導く太陽";

  return {
    birthdaySeed,
    winBeliefType,
    workStyleKey,
    workStyleScores,
    marketingKey,
    marketingScores,
    customerKey: workStyleKey,
    customerModifier,
    partnerWorkKey: workStyleKey,
    partnerMarketingKey: marketingKey,
    losingTypeKey: winBeliefType,
    losingRiskLabel
  };
}

    function selectAnswer(id, value) {
      answers[id] = value;
      renderQuestion();
    }

    function goBack() {
      if (step > 1) step -= 1;
      else step = 0;
      render();
    }

    function goNext() {
      const q = QUESTIONS[step - 1];
      if (!answers[q.id]) {
        alert("AかBを選んでください。");
        return;
      }
      step += 1;
      if(step > QUESTIONS.length){
  renderResult();
  return;
}
      render();
    }

    function restartDiagnosis() {
      step = 0;
      answers = {};
      render();
    }
    function render() {
  if (step === 0) {
    return;
  }

  if (step >= 1 && step <= QUESTIONS.length) {
    renderQuestion();
    return;
  }

  renderResult();
}
    function renderQuestion() {
  const q = QUESTIONS[step - 1];
  if (!q) return;

  const selected = answers[q.id];

  document.getElementById("screen-question").innerHTML = `
    <div class="card">
      <div class="progress-text">進行状況 ${Math.round((step / QUESTIONS.length) * 100)}%</div>
      <div class="progress"><div class="progress-bar" style="width:${(step / QUESTIONS.length) * 100}%"></div></div>
      <div class="question-count">質問 ${step} / ${QUESTIONS.length}</div>

      <div class="question-card">
        <div class="question-number">Q${q.id}</div>
        <h2>${q.text}</h2>

        <button class="answer-btn ${selected === "A" ? "selected" : ""}" onclick="selectAnswer(${q.id}, 'A')">
          <div class="answer-label">A</div>
          <div>${q.a}</div>
        </button>

        <button class="answer-btn ${selected === "B" ? "selected" : ""}" onclick="selectAnswer(${q.id}, 'B')">
          <div class="answer-label">B</div>
          <div>${q.b}</div>
        </button>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="goBack()">戻る</button>
        <button class="btn-primary" onclick="goNext()">次へ</button>
      </div>
    </div>
  `;

  document.getElementById("screen-question").classList.remove("hidden");
  document.getElementById("screen-result").classList.add("hidden");
}

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

                </div>
              `).join("")}

        return `
          <section class="result-card">
            <div class="result-number">${index + 1}. ${escapeHtml(item.label)}</div>

      printWindow.document.write(`
