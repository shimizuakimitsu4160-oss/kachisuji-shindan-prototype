<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ひとりビジネス勝ち筋診断</title>
  <style>
    body { background: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); padding: 40px; width: 100%; max-width: 500px; }
    .input-row { display: flex; gap: 5px; align-items: center; margin-top: 10px; }
    input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1; }
    .btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    .hidden { display: none; }
    h2 { font-size: 18px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card" id="screen-top">
    <h1>勝ち筋診断</h1>
    <label>お名前</label><input type="text" id="name" style="width: 90%; margin-bottom: 20px;">
    <label>生年月日</label>
    <div class="input-row">
      <input type="number" id="by" placeholder="1977">年
      <input type="number" id="bm" placeholder="03">月
      <input type="number" id="bd" placeholder="13">日
    </div>
    <button class="btn" onclick="start()">診断をはじめる</button>
  </div>

  <div class="card hidden" id="screen-q">
    <div id="q-content"></div>
  </div>

  <script>
    const QUESTIONS = ["アイデアを出すときは、まだ世の中にない価値を考えるのが好きだ", "ひとりで考える時間があると、仕事の質が上がりやすい"]; 
    let cur = 0;
    function start() {
      document.getElementById('screen-top').classList.add('hidden');
      document.getElementById('screen-q').classList.remove('hidden');
      render();
    }
    function render() {
      document.getElementById('q-content').innerHTML = `
        <h2>${cur + 1}. ${QUESTIONS[cur]}</h2>
        <button class="btn" onclick="next()">かなりそう思う</button>
        <button class="btn" style="background:#666" onclick="next()">そこまでではない</button>
      `;
    }
    function next() {
      cur++;
      if(cur < QUESTIONS.length) render();
      else document.getElementById('q-content').innerHTML = "<h2>診断完了</h2><button class='btn' onclick='window.print()'>結果をPDFで保存する</button>";
    }
  </script>
</body>
</html>
