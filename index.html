<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ひとりビジネス勝ち筋診断 プロトタイプ</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: #f8f9fa; color: #111; }
    .wrap { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); padding: 32px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; text-align: center; }
    .birth-input-group { display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 20px; }
    .birth-input-group input { width: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 16px; }
    .birth-input-group input.year { width: 100px; }
    .q-container { margin-bottom: 40px; border-bottom: 1px dashed #eee; padding-bottom: 20px; }
    .q-text { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: block; }
    .options { display: flex; gap: 12px; }
    .opt-btn { flex: 1; padding: 16px; border: 1px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; transition: 0.2s; font-weight: bold; }
    .opt-btn.active { background: #111; color: #fff; border-color: #111; }
    .progress-info { text-align: center; color: #666; margin-bottom: 10px; font-size: 14px; }
    .hidden { display: none; }
    .btn-next { display: block; width: 100%; padding: 20px; background: #111; color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    .result-box { background: #f0f0f0; border-radius: 16px; padding: 24px; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="screen-top" class="card">
      <h1>ひとりビジネス勝ち筋診断</h1>
      <p style="text-align: center; color: #666;">生年月日と32の質問から、あなたの勝ち筋を導き出します。</p>
      
      <div style="margin-top: 30px;">
        <label style="display: block; text-align: center; font-weight: bold;">生年月日を入力してください</label>
        <div class="birth-input-group">
          <input type="number" id="by" class="year" placeholder="1977" maxlength="4"> 年
          <input type="number" id="bm" placeholder="03" maxlength="2"> 月
          <input type="number" id="bd" placeholder="13" maxlength="2"> 日
        </div>
      </div>
      <button class="btn-next" onclick="startDiagnosis()">診断を開始する</button>
    </div>

    <div id="screen-question" class="card hidden">
      <div class="progress-info" id="page-indicator">Step 1 / 4</div>
      <div id="questions-area"></div>
      <button id="nextPageBtn" class="btn-next" onclick="nextPage()">次の8問へ</button>
    </div>

    <div id="screen-result" class="card hidden">
      <h1>診断完了</h1>
      <div class="result-box">
        <h2 id="res-type">分析中...</h2>
        <p>※プロトタイプ版：生年月日の数秘からタイプを出しています</p>
      </div>
      <button class="btn-next" onclick="downloadPdf()">結果をPDFで保存する</button>
      <button style="background:none; border:none; color:#666; width:100%; cursor:pointer; margin-top:10px;" onclick="location.reload()">最初からやり直す</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { id: 1, text: "アイデアを出すときは、まだ世の中にない価値を考えるのが好きだ" },
      { id: 2, text: "ひとりで考える時間があると、仕事の質が上がりやすい" },
      { id: 3, text: "悩みが深い相手の方が、力を発揮しやすい" },
      { id: 4, text: "売り込むより、共感を生む発信の方が向いている" },
      { id: 5, text: "一緒に働くなら、安心感のある人が合う" },
      { id: 6, text: "集客では、自分にない強みを持つ相手と組みたい" },
      { id: 7, text: "頑張りすぎて、自分のペースを崩しやすい" },
      { id: 8, text: "感謝されると、やる気が大きく上がる" },
      { id: 9, text: "計画より、まず動いてから整える方が得意だ" },
      { id: 10, text: "理想のお客様像はかなり明確にある" },
      { id: 11, text: "人前で話すことは集客の武器になりうる" },
      { id: 12, text: "役割分担がはっきりしている方が働きやすい" },
      { id: 13, text: "紹介や口コミの流れを作る相手と相性がいい" },
      { id: 14, text: "やることが増えると、優先順位がぼやけやすい" },
      { id: 15, text: "競争よりも独自ポジションを取りたい" },
      { id: 16, text: "ルーティンより、変化のある働き方が合う" },
      { id: 17, text: "広く浅くより、狭く深い市場に惹かれる" },
      { id: 18, text: "SNSは世界観が伝わる使い方が向いている" },
      { id: 19, text: "一緒に働く相手には、スピード感も求めたい" },
      { id: 20, text: "集客パートナーには数字感覚も必要だ" },
      { id: 21, text: "人に合わせすぎて疲れることがある" },
      { id: 22, text: "自分の体験談は価値になると思う" },
      { id: 23, text: "朝の立ち上がりやスタートダッシュが得意だ" },
      { id: 24, text: "相手の感情の変化に気づきやすい" },
      { id: 25, text: "企画やイベント型の集客にワクワクする" },
      { id: 26, text: "細かい実務を支えてくれる人がいると強い" },
      { id: 27, text: "言語化のうまい人と組むと伸びやすい" },
      { id: 28, text: "完璧にしようとして公開が遅れがちだ" },
      { id: 29, text: "商品より先に、理念や想いを伝えたい" },
      { id: 30, text: "自分の感覚を信じて意思決定することが多い" },
      { id: 31, text: "悩みが深い人ほど、自分の価値を発揮できる" },
      { id: 32, text: "売り込みより、共感を生む導線が向いている" }
    ];

    let currentPage = 0;
    let answers = {};

    function startDiagnosis() {
      const y = document.getElementById('by').value;
      const m = document.getElementById('bm').value;
      const d = document.getElementById('bd').value;
      if(!y || !m || !d) { alert("生年月日を入力してください"); return; }
      document.getElementById('screen-top').classList.add('hidden');
      document.getElementById('screen-question').classList.remove('hidden');
      renderPage();
    }

    function renderPage() {
      const area = document.getElementById('questions-area');
      area.innerHTML = '';
      const start = currentPage * 8;
      const end = start + 8;
      const pageQuestions = QUESTIONS.slice(start, end);
      
      document.getElementById('page-indicator').innerText = `Step ${currentPage + 1} / 4`;
      
      pageQuestions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'q-container';
        div.id = `q-wrap-${q.id}`;
        div.innerHTML = `
          <span class="q-text">${q.id}. ${q.text}</span>
          <div class="options">
            <button class="opt-btn ${answers[q.id]==='A'?'active':''}" onclick="setAns(${q.id}, 'A')">かなりそう思う</button>
            <button class="opt-btn ${answers[q.id]==='B'?'active':''}" onclick="setAns(${q.id}, 'B')">そこまでではない</button>
          </div>
        `;
        area.appendChild(div);
      });

      document.getElementById('nextPageBtn').innerText = currentPage === 3 ? "結果を見る" : "次の8問へ";
      window.scrollTo(0, 0);
    }

    function setAns(id, val) {
      answers[id] = val;
      renderPage();
      
      // オートスクロール：回答した設問の次へ
      const nextId = id + 1;
      const nextEl = document.getElementById(`q-wrap-${nextId}`);
      if(nextEl) {
        setTimeout(() => {
          nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }

    function nextPage() {
      const start = currentPage * 8;
      for(let i=start+1; i<=start+8; i++) {
        if(!answers[i]) { alert("未回答の質問があります"); return; }
      }
      
      if(currentPage < 3) {
        currentPage++;
        renderPage();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('screen-question').classList.add('hidden');
      document.getElementById('screen-result').classList.remove('hidden');
      
      const y = document.getElementById('by').value;
      const m = document.getElementById('bm').value;
      const d = document.getElementById('bd').value;
      const seed = (parseInt(y) + parseInt(m) + parseInt(d)) % 5;
      const types = ["導く太陽", "深海探求", "旋風ムーブメント", "共鳴の灯火", "静かな革命"];
      document.getElementById('res-type').innerText = `あなたの勝ち筋タイプ：${types[seed]}`;
    }

    function downloadPdf() {
      const type = document.getElementById('res-type').innerText;
      const y = document.getElementById('by').value;
      const m = document.getElementById('bm').value;
      const d = document.getElementById('bd').value;
      
      const printWindow = window.open("", "_blank");
      printWindow.document.write(`
        <html><head><title>診断結果</title><style>body{font-family:sans-serif;padding:40px;}</style></head>
        <body>
          <h1>ひとりビジネス勝ち筋診断 結果</h1>
          <p>生年月日：${y}年${m}月${d}日</p>
          <hr>
          <h2>${type}</h2>
          <p>※本PDFはプロトタイプ版の出力結果です。</p>
        </body></html>
      `);
      printWindow.document.close();
      setTimeout(() => { printWindow.print(); }, 500);
    }
  </script>
</body>
</html>
